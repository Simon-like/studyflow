version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: studyflow-postgres
    restart: always
    environment:
      POSTGRES_USER: studyflow
      POSTGRES_PASSWORD: studyflow_password
      POSTGRES_DB: studyflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyflow -d studyflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: studyflow-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS 后端服务
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: studyflow-server
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: "postgresql://studyflow:studyflow_password@postgres:5432/studyflow?schema=public"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "your-super-secret-jwt-key-change-this-in-production"
      JWT_ACCESS_EXPIRATION: "2h"
      JWT_REFRESH_EXPIRATION: "7d"
      BCRYPT_ROUNDS: "12"
      CORS_ORIGIN: "http://localhost:5173"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - server_uploads:/app/uploads

volumes:
  postgres_data:
  redis_data:
  server_uploads:
